# Use DATABASE_URL=postgresql+asyncpg://rl_gym:rl_gym@postgres:5432/rl_gym in .env for PostgreSQL

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rl_gym
      POSTGRES_PASSWORD: rl_gym
      POSTGRES_DB: rl_gym
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rl_gym"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

# pg-data persists database data between restarts
volumes:
  pg-data:
