# Use DATABASE_URL=postgresql+asyncpg://rl_gym:rl_gym@postgres:5432/rl_gym in .env for PostgreSQL

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  worker:
    build: .
    command: python -m arq app.worker.settings.WorkerSettings
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      RAY_ADDRESS: ray://ray-head:10001
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rl_gym
      POSTGRES_PASSWORD: rl_gym
      POSTGRES_DB: rl_gym
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rl_gym"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

  ray-head:
    image: rayproject/ray:latest
    command: ray start --head --port=6379 --dashboard-host=0.0.0.0 --block
    ports:
      - "8265:8265"
      - "6380:6379"
    shm_size: 2gb
    restart: unless-stopped

  ray-worker:
    image: rayproject/ray:latest
    command: ray start --address=ray-head:6379 --block
    depends_on:
      - ray-head
    shm_size: 2gb
    deploy:
      replicas: 2
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command: --config.file=/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

# pg-data persists database data between restarts
volumes:
  pg-data:
  grafana-data:
