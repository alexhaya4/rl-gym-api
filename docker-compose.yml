# Use DATABASE_URL=postgresql+asyncpg://rl_gym:rl_gym@postgres:5432/rl_gym in .env for PostgreSQL

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  worker:
    build: .
    command: python -m arq app.worker.settings.WorkerSettings
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rl_gym
      POSTGRES_PASSWORD: rl_gym
      POSTGRES_DB: rl_gym
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rl_gym"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

# pg-data persists database data between restarts
volumes:
  pg-data:
