name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install hatchling
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports

  test:
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rl_gym
          POSTGRES_PASSWORD: rl_gym
          POSTGRES_DB: rl_gym
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rl_gym"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      SECRET_KEY: test-secret-key-for-ci
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://rl_gym:rl_gym@localhost:5432/rl_gym
      REDIS_URL: redis://localhost:6379
      GRPC_PORT: 50051

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install hatchling
          pip install -e ".[dev]"

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build . --tag rl-gym-api:test
